name: Stock Trading Agent

on:
  schedule:
    # Run every 5 minutes during market hours (IST = UTC+5:30)
    # 09:15 IST = 03:45 UTC, 15:20 IST = 09:50 UTC
    - cron: '45,50,55 3 * * 1-5'   # 09:15-09:55 IST
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 4 * * 1-5'  # 09:30-10:25 IST
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 5 * * 1-5'  # 10:30-11:25 IST
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 6 * * 1-5'  # 11:30-12:25 IST
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 7 * * 1-5'  # 12:30-13:25 IST
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 8 * * 1-5'  # 13:30-14:25 IST
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 9 * * 1-5'  # 14:30-15:25 IST
  workflow_dispatch:  # Manual trigger button

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading scan
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_ID: ${{ secrets.ANGEL_CLIENT_ID }}
          ANGEL_PASSWORD: ${{ secrets.ANGEL_PASSWORD }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CAPITAL_PER_TRADE: ${{ secrets.CAPITAL_PER_TRADE }}
          MAX_OPEN_TRADES: ${{ secrets.MAX_OPEN_TRADES }}
          MARKET_OPEN: "09:15"
          MARKET_CLOSE: "15:20"
          PAPER_TRADING: "False"
        run: python scan_once.py
