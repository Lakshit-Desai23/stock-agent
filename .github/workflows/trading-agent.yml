name: Stock Trading Agent

on:
  schedule:
    - cron: '45 3 * * 1-5'
    - cron: '50,55 3 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 4 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 5 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 6 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 7 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 8 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 9 * * 1-5'
    - cron: '50 9 * * 1-5'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    env:
      ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
      ANGEL_CLIENT_ID: ${{ secrets.ANGEL_CLIENT_ID }}
      ANGEL_PASSWORD: ${{ secrets.ANGEL_PASSWORD }}
      ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      CAPITAL_PER_TRADE: ${{ secrets.CAPITAL_PER_TRADE }}
      MAX_OPEN_TRADES: ${{ secrets.MAX_OPEN_TRADES }}
      MARKET_OPEN: "09:15"
      MARKET_CLOSE: "15:20"
      PAPER_TRADING: "True"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run trading scan
        run: python scan_once.py
